scan_filter_chain:
  # Remove close-range noise (wheelchair frame, handle)
  - name: range_filter
    type: laser_filters/LaserScanRangeFilter
    params:
      use_message_range_limits: false
      lower_threshold: 0.5
      upper_threshold: 12.0
      lower_replacement_value: .inf
      upper_replacement_value: .inf

  # Block rear sector where pusher walks (~120° to 240° = behind LiDAR)
  # LiDAR forward = chair forward direction. Pusher is at ~180°.
  # Keep only -2.09 to 2.09 rad (-120° to +120°) = front 240° arc
  - name: angular_filter
    type: laser_filters/LaserScanAngularBoundsFilterInPlace
    params:
      lower_angle: -2.09
      upper_angle: 2.09
